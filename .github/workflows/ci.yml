name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: design-thinking-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install structural test tools
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install pytest pip-audit

      - name: Check installed dependencies
        run: python3 -m pip check

      - name: Audit installed dependencies
        run: python3 -m pip_audit

      - name: Run notebook JSON contracts
        run: python3 -m pytest tests -q

      - name: Validate all portfolio notebooks
        run: python3 tools/validate_portfolio_notebooks.py notebooks/*.ipynb
